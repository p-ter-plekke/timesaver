<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Time Saver</title>
</head>

<body>

    <div class="header">
        <div class="logo">TimeSaver.</div>
        <div class="hourwage">
            <div class="hourly-wage">Hourly wage:</div>
            <input type="text" id="inputwage" />
        </div>
    </div>
    <div class="cardsbody">
        <div class="card">
            <div class="cardtop">
                <div class="price">
                    <div class="euro">€</div>
                    <input type="text" id="inputprice" />
                </div>
                <div class="operator-buttons">
                    <!-- <button class="infobutton">i</button> -->
                    <button class="playbutton">&#9658;</button>
                </div>
            </div>
            <div class="cardmiddle">
                <div class="icon">[...]</div>
                <svg class="progress-timer" width="200" height="200">
                    <circle class="circle-ring" cx="100" cy="100" r="80" />
                </svg>
            </div>
            <div class="cardbottom">
                <div class="cardtracker"></div>
            </div>
        </div>
        <div class="pluscard">
            <div class="plus">+</div>
        </div>
    </div>
    <div class="footer">
        Save minutes instead of money.
    </div>

    <script type="text/javascript" src="./script.js"></script>
</body>

</html>
