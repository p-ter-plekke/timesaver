<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Time Saver</title>
</head>

<body>

    <div class="header">
        <div class="logo">TimeSaver.</div>
        <div class="hourwage">
            <input type="text" id="inputwage" />
            <button class="set-wage-button">Set hourly wage</button>
        </div>
    </div>
    <div class="cardsbody">
        <div class="card">
            <div class="cardtop">
                <div class="price">
                    <input type="text" id="inputprice" />
                    <button class="set-price-button">Set price</button>
                </div>
                <div class="operator-buttons">
                    <button class="infobutton">i</button>
                    <button class="playbutton">&#9658;</button>
                    <button class="pausebutton">&#x23F8;</button>
                </div>
            </div>
            <div class="cardmiddle">
                <!-- icon with svg circle around it -->
                <svg class="progress-timer" width="200" height="200">
                    <circle class="circle-ring" cx="100" cy="100" r="80" />
                </svg>
            </div>
            <div class="cardbottom">
                <div class="cardtextbox">
                    <div class="cardheader">Goal</div>
                    <div class="timer" id="goal-timer">[timer]</div>
                </div>
                <div class="cardtextbox">
                    <div class="cardheader">Minutes to go</div>
                    <div class="timer" id="togo-timer">[timer]</div>
                </div>
                <div class="cardtextbox">
                    <div class="cardheader">Minutes saved</div>
                    <div class="timer" id="timesaved-timer">[timer]</div>
                </div>
            </div>
        </div>
        <div class="pluscard">
            <div class="plus">+</div>
        </div>
    </div>
    <div class="footer">
        "Save minutes instead of money"
    </div>

    <script type="text/javascript" src="./script.js"></script>
</body>

</html>
