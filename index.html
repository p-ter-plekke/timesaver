<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Time Saver</title>
</head>

<body>

    <div class="header">
        <div class="logo">TimeSaver.</div>
        <div class="hourwage">
            <!-- text box -->
        </div>
    </div>
    <div class="cardsbody">
        <div class="card">
            <div class="cardtop">
                <button class="playbutton">&#9658;</button>
            </div>
            <div class="cardmiddle">
                <!-- icon with circle around it -->
            </div>
            <div class="cardbottom">
                <div class="cardtextbox">
                    <div class="cardheader">Goal</div>
                    <div class="timer">[timer]</div>
                </div>
                <div class="cardtextbox">
                    <div class="cardheader">Time to go</div>
                    <div class="timer">[timer]</div>
                </div>
                <div class="cardtextbox">
                    <div class="cardheader">Time saved</div>
                    <div class="timer">[timer]</div>
                </div>
            </div>
        </div>
        <div class="pluscard">
            <div class="plus">+</div>
        </div>
    </div>
    <div class="footer">
        "Save up time instead of money"
    </div>

    <script type="text/javascript" src="./script.js"></script>
</body>

</html>
