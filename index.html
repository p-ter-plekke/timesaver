<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Saver</title>
    <link rel="stylesheet" href="./style.css">
    <script defer src="./script.js"></script>
</head>

<body>

    <div class="header">
        <div class="logo">TimeSaver.</div>
        <div class="hourwage">
            <div class="hourly-wage">Hourly wage:</div>
            <input type="text" id="inputwage" />
        </div>
    </div>
    <div class="cardsbody">
        <div class="card">
            <div class="cardtop">
                <div class="price">
                    <div class="euro">€</div>
                    <input type="text" id="inputprice" />
                </div>
                <div class="operator-buttons">
                    <!-- <button class="infobutton">i</button> -->
                    <button class="playbutton">&#9658;</button>
                </div>
            </div>
            <div class="cardmiddle">
                <div class="icon-placeholder">
                    <img data-modal-target="#modal" class="icon-button" src="./icons/image-plus.svg" alt="image-plus">
                    <!-- data-* allows different modals on same page with different buttons to open them. -->
                </div>
                <svg class="progress-timer" width="200" height="200">
                    <circle class="gray-ring" cx="100" cy="100" r="80" />
                    <circle class="circle-ring" cx="100" cy="100" r="80" />
                </svg>
            </div>
            <div class="cardbottom">
                <div class="cardtracker"></div>
            </div>
        </div>
        <div class="pluscard">
            <div class="plus">+</div>
        </div>
    </div>
    <div class="footer">
        Save minutes instead of money.
    </div>
    <div class="modal" id="modal">
        <div class="modal-header">
            <button data-close-button class="close-button">&times;</button>
        </div>
        <div class="modal-body">
            <img class="icon" src="./icons/apple.svg" alt="apple">
            <img class="icon" src="./icons/armchair.svg" alt="armchair">
            <img class="icon" src="./icons/balloon.svg" alt="balloon">
            <img class="icon" src="./icons/bike.svg" alt="bike">
            <img class="icon" src="./icons/bird.svg" alt="bird">
            <img class="icon" src="./icons/book-text.svg" alt="book-text">
            <img class="icon" src="./icons/brush.svg" alt="brush">
            <img class="icon" src="./icons/bus.svg" alt="bus">
            <img class="icon" src="./icons/cake.svg" alt="cake">
            <img class="icon" src="./icons/cat.svg" alt="cat">
            <img class="icon" src="./icons/clapperboard.svg" alt="clapperboard">
            <img class="icon" src="./icons/clock.svg" alt="clock">
            <img class="icon" src="./icons/coffee.svg" alt="coffee">
            <img class="icon" src="./icons/headphones.svg" alt="headphones">
            <img class="icon" src="./icons/martini.svg" alt="martini">
            <img class="icon" src="./icons/tree-pine.svg" alt="tree-pine">
        </div>
    </div>
    <div id="overlay"></div>
</body>

</html>
